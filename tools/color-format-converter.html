<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Color Format Converter | TheLasBrick Tools</title>
<meta name="description" content="Convert colors between HEX, RGB, HSL and CMYK formats."/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a2e;}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:800;}.logo span{color:#f59e0b;}
.back{color:#94a3b8;font-size:13px;text-decoration:none;}.back:hover{color:#fff;}
.container{max-width:860px;margin:32px auto;padding:0 20px 60px;}
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.07);}
h1{font-size:22px;font-weight:800;margin-bottom:6px;}
.sub{color:#64748b;font-size:14px;margin-bottom:24px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
textarea,input[type=text],input[type=number],select{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;}
textarea{resize:vertical;}textarea:focus,input:focus,select:focus{border-color:#f59e0b;}
.btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{opacity:.88;}.btn-sm{padding:8px 18px;font-size:13px;}
.btn-o{background:#fff;color:#f59e0b;border:2px solid #f59e0b;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.out{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;font-size:14px;min-height:80px;white-space:pre-wrap;word-break:break-all;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center;}
.sv{font-size:24px;font-weight:800;color:#f59e0b;}.sl{font-size:11px;color:#64748b;margin-top:3px;font-weight:600;text-transform:uppercase;}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}.f1{flex:1;min-width:0;}
.mt{margin-top:16px;}.ok{color:#16a34a;font-size:13px;margin-top:8px;}
.cp{float:right;background:#e2e8f0;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;}
.cp:hover{background:#f59e0b;color:#fff;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:580px){.g2{grid-template-columns:1fr;}.row{flex-direction:column;}}
</style>
</head><body>
<header><div class="logo">The<span>Last</span>Brick</div><a href="../index.html" class="back">&larr; All Tools</a></header>
<div class="container"><div class="card">
<h1>🎨 Color Format Converter</h1><p class="sub">Convert colors between HEX, RGB, HSL and CMYK formats.</p>

<div class="g2">
  <div>
    <label>Color Picker</label>
    <input type="color" id="pk" value="#f59e0b" oninput="fromPk()" style="width:100%;height:80px;border-radius:10px;border:1.5px solid #e2e8f0;cursor:pointer;"/>
    <label class="mt">HEX</label>
    <input type="text" id="hx" value="#f59e0b" placeholder="#000000" oninput="fromHx()" style="font-family:monospace;"/>
    <label class="mt">RGB</label>
    <div class="row">
      <input type="number" id="r" value="245" min="0" max="255" oninput="fromRgb()" style="font-family:monospace;text-align:center;"/>
      <input type="number" id="g" value="158" min="0" max="255" oninput="fromRgb()" style="font-family:monospace;text-align:center;"/>
      <input type="number" id="b" value="11"  min="0" max="255" oninput="fromRgb()" style="font-family:monospace;text-align:center;"/>
    </div>
  </div>
  <div>
    <div id="sw" style="width:100%;height:80px;border-radius:10px;border:1.5px solid #e2e8f0;margin-bottom:12px;background:#f59e0b;"></div>
    <label>All Formats</label>
    <div id="fmts" class="out" style="line-height:2.3;font-family:monospace;font-size:13px;min-height:auto;"></div>
  </div>
</div>
<script>
function all(r,g,b){r=Math.max(0,Math.min(255,Math.round(r)));g=Math.max(0,Math.min(255,Math.round(g)));b=Math.max(0,Math.min(255,Math.round(b)));
  const hx='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
  const mx=Math.max(r,g,b)/255,mn=Math.min(r,g,b)/255,l=(mx+mn)/2,s=mx===mn?0:(mx-mn)/(1-Math.abs(2*l-1));
  const h=mx===mn?0:mx===r/255?((g-b)/255/(mx-mn)+6)%6*60:mx===g/255?(b-r)/255/(mx-mn)*60+120:(r-g)/255/(mx-mn)*60+240;
  const k=1-Math.max(r,g,b)/255,cm=mx===0?0:(1-r/255-k)/(1-k),mm=mx===0?0:(1-g/255-k)/(1-k),ym=mx===0?0:(1-b/255-k)/(1-k);
  document.getElementById('pk').value=hx;document.getElementById('hx').value=hx;
  document.getElementById('r').value=r;document.getElementById('g').value=g;document.getElementById('b').value=b;
  document.getElementById('sw').style.background=hx;
  document.getElementById('fmts').innerHTML='HEX: <strong>'+hx.toUpperCase()+'</strong><br>RGB: <strong>rgb('+r+', '+g+', '+b+')</strong><br>HSL: <strong>hsl('+Math.round(h)+', '+Math.round(s*100)+'%, '+Math.round(l*100)+'%)</strong><br>CMYK: <strong>cmyk('+Math.round(cm*100)+'%, '+Math.round(mm*100)+'%, '+Math.round(ym*100)+'%, '+Math.round(k*100)+'%)</strong><br>CSS: <strong>color: '+hx+';</strong>';
}
function fromPk(){const h=document.getElementById('pk').value;document.getElementById('hx').value=h;all(parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16));}
function fromHx(){const h=document.getElementById('hx').value;if(/^#[0-9a-fA-F]{6}$/.test(h))all(parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16));}
function fromRgb(){all(+document.getElementById('r').value,+document.getElementById('g').value,+document.getElementById('b').value);}
all(245,158,11);
</script>
</div></div></body></html>
