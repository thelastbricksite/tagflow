<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Open Graph Preview | TheLasBrick Tools</title>
<meta name="description" content="Preview how your page looks when shared on social media."/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a2e;}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:800;}.logo span{color:#f59e0b;}
.back{color:#94a3b8;font-size:13px;text-decoration:none;}.back:hover{color:#fff;}
.container{max-width:860px;margin:32px auto;padding:0 20px 60px;}
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.07);}
h1{font-size:22px;font-weight:800;margin-bottom:6px;}
.sub{color:#64748b;font-size:14px;margin-bottom:24px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
textarea,input[type=text],input[type=number],select{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;}
textarea{resize:vertical;}textarea:focus,input:focus,select:focus{border-color:#f59e0b;}
.btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{opacity:.88;}.btn-sm{padding:8px 18px;font-size:13px;}
.btn-o{background:#fff;color:#f59e0b;border:2px solid #f59e0b;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.out{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;font-size:14px;min-height:80px;white-space:pre-wrap;word-break:break-all;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center;}
.sv{font-size:24px;font-weight:800;color:#f59e0b;}.sl{font-size:11px;color:#64748b;margin-top:3px;font-weight:600;text-transform:uppercase;}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}.f1{flex:1;min-width:0;}
.mt{margin-top:16px;}.ok{color:#16a34a;font-size:13px;margin-top:8px;}
.cp{float:right;background:#e2e8f0;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;}
.cp:hover{background:#f59e0b;color:#fff;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:580px){.g2{grid-template-columns:1fr;}.row{flex-direction:column;}}
</style>
</head><body>
<header><div class="logo">The<span>Last</span>Brick</div><a href="../index.html" class="back">&larr; All Tools</a></header>
<div class="container"><div class="card">
<h1>🌐 Open Graph Preview</h1><p class="sub">Preview how your page looks when shared on social media.</p>

<div class="g2">
  <div>
    <label>OG Title</label><input type="text" id="ti" placeholder="Share title" oninput="upd()"/>
    <label class="mt">OG Description</label><textarea id="de" rows="3" placeholder="Share description..." oninput="upd()"></textarea>
    <label class="mt">OG Image URL</label><input type="url" id="im" placeholder="https://example.com/image.jpg" oninput="upd()"/>
    <label class="mt">Or upload image</label>
    <input type="file" accept="image/*" onchange="ul(this)" style="margin-top:6px;font-size:13px;"/>
    <label class="mt">Site Name</label><input type="text" id="sn" placeholder="yoursite.com" oninput="upd()"/>
  </div>
  <div>
    <label>Facebook Card</label>
    <div id="fb" style="border:1.5px solid #e2e8f0;border-radius:8px;overflow:hidden;font-family:Arial,sans-serif;">
      <div id="fbi" style="width:100%;height:175px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:36px;">🖼️</div>
      <div style="padding:12px;background:#f0f2f5;">
        <div id="fbs" style="font-size:11px;color:#606770;text-transform:uppercase;margin-bottom:3px;"></div>
        <div id="fbt" style="font-size:15px;font-weight:700;color:#1c1e21;margin-bottom:2px;"></div>
        <div id="fbd" style="font-size:13px;color:#606770;"></div>
      </div>
    </div>
    <label class="mt">Twitter Card</label>
    <div id="tw" style="border:1.5px solid #e2e8f0;border-radius:12px;overflow:hidden;font-family:-apple-system,sans-serif;">
      <div id="twi" style="width:100%;height:145px;background:#e2e8f0;display:flex;align-items:center;justify-content:center;font-size:32px;">🖼️</div>
      <div style="padding:10px 12px;">
        <div id="twt" style="font-size:14px;font-weight:700;"></div>
        <div id="twd" style="font-size:13px;color:#536471;margin-top:2px;"></div>
        <div id="tws" style="font-size:12px;color:#536471;margin-top:4px;"></div>
      </div>
    </div>
  </div>
</div>
<script>
let imgD='';
function ul(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{imgD=e.target.result;upd();};r.readAsDataURL(f);}
function upd(){
  const ti=document.getElementById('ti').value||'Your Page Title',de=document.getElementById('de').value||'Description.',sn=document.getElementById('sn').value||'yoursite.com';
  const imgSrc=imgD||document.getElementById('im').value;
  const imgHtml=imgSrc?'<img src="'+imgSrc+'" style="width:100%;height:100%;object-fit:cover;"/>':'<span style="font-size:36px;">🖼️</span>';
  document.getElementById('fbi').innerHTML=imgHtml;document.getElementById('twi').innerHTML=imgHtml;
  document.getElementById('fbt').textContent=ti;document.getElementById('fbd').textContent=de.slice(0,100)+(de.length>100?'...':'');document.getElementById('fbs').textContent=sn;
  document.getElementById('twt').textContent=ti;document.getElementById('twd').textContent=de.slice(0,100);document.getElementById('tws').textContent=sn;
}
upd();
</script>
</div></div></body></html>
