<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Image to PDF | TheLasBrick Tools</title>
<meta name="description" content="Convert one or more images into a single PDF document."/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a2e;}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:800;}.logo span{color:#f59e0b;}
.back{color:#94a3b8;font-size:13px;text-decoration:none;}.back:hover{color:#fff;}
.container{max-width:860px;margin:32px auto;padding:0 20px 60px;}
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.07);}
h1{font-size:22px;font-weight:800;margin-bottom:6px;}
.sub{color:#64748b;font-size:14px;margin-bottom:24px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
textarea,input[type=text],input[type=number],select{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;}
textarea{resize:vertical;}textarea:focus,input:focus,select:focus{border-color:#f59e0b;}
.btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{opacity:.88;}.btn-sm{padding:8px 18px;font-size:13px;}
.btn-o{background:#fff;color:#f59e0b;border:2px solid #f59e0b;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.out{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;font-size:14px;min-height:80px;white-space:pre-wrap;word-break:break-all;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center;}
.sv{font-size:24px;font-weight:800;color:#f59e0b;}.sl{font-size:11px;color:#64748b;margin-top:3px;font-weight:600;text-transform:uppercase;}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}.f1{flex:1;min-width:0;}
.mt{margin-top:16px;}.ok{color:#16a34a;font-size:13px;margin-top:8px;}
.cp{float:right;background:#e2e8f0;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;}
.cp:hover{background:#f59e0b;color:#fff;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:580px){.g2{grid-template-columns:1fr;}.row{flex-direction:column;}}
</style>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head><body>
<header><div class="logo">The<span>Last</span>Brick</div><a href="../index.html" class="back">&larr; All Tools</a></header>
<div class="container"><div class="card">
<h1>🖼️➡️📄 Image to PDF</h1><p class="sub">Convert one or more images into a single PDF document.</p>

<div id="dz" class="drop" onclick="document.getElementById('fi').click()">
  <div style="font-size:42px;">🖼️</div>
  <p><strong>Click or drag images here</strong> (multiple allowed)</p>
  <input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="addFiles(this.files)"/>
</div>
<div id="list" style="margin-top:12px;"></div>
<div id="opts" style="display:none;">
  <label class="mt">Page Size</label>
  <select id="ps"><option value="A4">A4</option><option value="Letter">Letter</option><option value="fit">Fit to image</option></select>
  <button class="btn mt" onclick="convert()">Convert to PDF</button>
</div>
<div id="st" class="ok mt"></div>
<script>
let files=[];
function addFiles(fl){files=[...files,...Array.from(fl)];render();}
function render(){
  document.getElementById('list').innerHTML=files.map((f,i)=>'<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;"><span>🖼️</span><span style="flex:1;font-size:14px;">'+f.name+'</span><button onclick="files.splice('+i+',1);render()" style="border:none;background:none;color:#dc2626;cursor:pointer;font-size:18px;">&times;</button></div>').join('');
  document.getElementById('opts').style.display=files.length?'block':'none';
}
async function convert(){
  const st=document.getElementById('st');st.textContent='Converting...';st.className='ok';
  try{
    const doc=await PDFLib.PDFDocument.create();
    const ps=document.getElementById('ps').value;
    for(const f of files){
      const buf=await f.arrayBuffer();let img;
      if(f.type==='image/png')img=await doc.embedPng(buf);else img=await doc.embedJpg(buf);
      const{width,height}=img;let pw,ph;
      if(ps==='A4'){pw=595;ph=842;}else if(ps==='Letter'){pw=612;ph=792;}else{pw=width;ph=height;}
      const page=doc.addPage([pw,ph]);const sc=Math.min(pw/width,ph/height);
      page.drawImage(img,{x:(pw-width*sc)/2,y:(ph-height*sc)/2,width:width*sc,height:height*sc});
    }
    const bytes=await doc.save();const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([bytes],{type:'application/pdf'}));a.download='images.pdf';a.click();
    st.textContent='Converted '+files.length+' image'+(files.length>1?'s':'')+' to PDF!';
  }catch(e){st.textContent='Error: '+e.message;st.className='err';}
}
const dz=document.getElementById('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('over');addFiles(e.dataTransfer.files);});
</script>
</div></div></body></html>
