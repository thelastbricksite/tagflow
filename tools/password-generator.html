<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Password Generator | TheLasBrick Tools</title>
<meta name="description" content="Generate strong, secure passwords with custom length and character options."/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a2e;}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:20px;font-weight:800;}.logo span{color:#f59e0b;}
.back{color:#94a3b8;font-size:13px;text-decoration:none;}.back:hover{color:#fff;}
.container{max-width:860px;margin:32px auto;padding:0 20px 60px;}
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 2px 20px rgba(0,0,0,.07);}
h1{font-size:22px;font-weight:800;margin-bottom:6px;}
.sub{color:#64748b;font-size:14px;margin-bottom:24px;}
label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
textarea,input[type=text],input[type=number],select{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;}
textarea{resize:vertical;}textarea:focus,input:focus,select:focus{border-color:#f59e0b;}
.btn{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn:hover{opacity:.88;}.btn-sm{padding:8px 18px;font-size:13px;}
.btn-o{background:#fff;color:#f59e0b;border:2px solid #f59e0b;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}
.out{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:16px;font-size:14px;min-height:80px;white-space:pre-wrap;word-break:break-all;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:20px;}
.stat{background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center;}
.sv{font-size:24px;font-weight:800;color:#f59e0b;}.sl{font-size:11px;color:#64748b;margin-top:3px;font-weight:600;text-transform:uppercase;}
.row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;}.f1{flex:1;min-width:0;}
.mt{margin-top:16px;}.ok{color:#16a34a;font-size:13px;margin-top:8px;}
.cp{float:right;background:#e2e8f0;border:none;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600;}
.cp:hover{background:#f59e0b;color:#fff;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:580px){.g2{grid-template-columns:1fr;}.row{flex-direction:column;}}
</style>
</head><body>
<header><div class="logo">The<span>Last</span>Brick</div><a href="../index.html" class="back">&larr; All Tools</a></header>
<div class="container"><div class="card">
<h1>🔐 Password Generator</h1><p class="sub">Generate strong, secure passwords with custom length and character options.</p>

<div class="g2">
  <div>
    <label>Password Length: <strong id="lv">16</strong></label>
    <input type="range" id="len" min="6" max="64" value="16" oninput="document.getElementById('lv').textContent=this.value;gen()" style="width:100%;margin:8px 0 16px;"/>
    <label>Character Types</label>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px;">
      <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="up" checked onchange="gen()"/> Uppercase (A–Z)</label>
      <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="lo" checked onchange="gen()"/> Lowercase (a–z)</label>
      <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="nm" checked onchange="gen()"/> Numbers (0–9)</label>
      <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="sy" onchange="gen()"/> Symbols (!@#$%)</label>
      <label style="display:flex;align-items:center;gap:8px;font-weight:400;"><input type="checkbox" id="am" onchange="gen()"/> Ambiguous characters excluded</label>
    </div>
    <label>How many passwords?</label>
    <input type="number" id="cnt" value="5" min="1" max="20" oninput="gen()"/>
    <button class="btn mt" onclick="gen()" style="width:100%;">Generate</button>
  </div>
  <div>
    <label>Generated Passwords</label>
    <div style="position:relative;">
      <textarea id="out" rows="14" readonly style="font-family:monospace;font-size:13px;background:#f8fafc;"></textarea>
      <button class="cp" onclick="navigator.clipboard.writeText(document.getElementById('out').value)">Copy All</button>
    </div>
    <div id="str" style="margin-top:10px;"></div>
  </div>
</div>
<script>
function gen(){
  let chars='';
  const amb='0O1lI';
  if(document.getElementById('up').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('lo').checked)chars+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('nm').checked)chars+='0123456789';
  if(document.getElementById('sy').checked)chars+='!@#$%^&*()-_=+[]{}|;:,.<>?';
  if(document.getElementById('am').checked)chars=chars.split('').filter(c=>!amb.includes(c)).join('');
  if(!chars){document.getElementById('out').value='Please select at least one character type.';return;}
  const len=+document.getElementById('len').value,n=Math.min(20,+document.getElementById('cnt').value||1);
  const passwords=Array.from({length:n},()=>{const arr=new Uint32Array(len);crypto.getRandomValues(arr);return Array.from(arr,v=>chars[v%chars.length]).join('');});
  document.getElementById('out').value=passwords.join('
');
  // Strength indicator for first password
  const p=passwords[0];let sc=0;if(p.length>=12)sc++;if(/[A-Z]/.test(p))sc++;if(/[a-z]/.test(p))sc++;if(/[0-9]/.test(p))sc++;if(/[^a-zA-Z0-9]/.test(p))sc++;
  const lv=['Weak','Fair','Good','Strong','Very Strong'][Math.min(4,sc-1)];const col=['#dc2626','#d97706','#ca8a04','#16a34a','#0891b2'][Math.min(4,sc-1)];
  document.getElementById('str').innerHTML='Strength of first password: <strong style="color:'+col+';">'+lv+'</strong>';
}
gen();
</script>
</div></div></body></html>
