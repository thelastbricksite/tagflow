let currentCategory = 'all';
let currentSearch = '';

function renderTools() {
    const grid = document.getElementById('toolsGrid');
    const filtered = tools.filter(t => {
        const matchCat = currentCategory === 'all' || t.cat === currentCategory;
        const q = currentSearch;
        const matchSearch = !q ||
            t.name.toLowerCase().includes(q) ||
            t.desc.toLowerCase().includes(q) ||
            t.cat.toLowerCase().includes(q) ||
            t.num.includes(q);
        return matchCat && matchSearch;
    });

    document.getElementById('resultCount').textContent =
        filtered.length < tools.length ? `Showing ${filtered.length} of ${tools.length} tools` : '';

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="no-results">🔍 No tools found. Try different keywords!</div>';
        return;
    }

    grid.innerHTML = filtered.map(t => `
        <a href="tools/${t.filename}" class="tool-card">
            <div class="card-header">
                <span class="tool-number">#${t.num}</span>
                <span class="tool-category">${t.cat}</span>
            </div>
            <h3>${t.name}</h3>
            <p class="tool-description">${t.desc}</p>
            <div class="tool-meta">
                <span class="tool-tag ${t.badgeClass}">${t.badge}</span>
            </div>
        </a>
    `).join('');
}

window.filterByCategory = function(cat, btn) {
    currentCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTools();
};

window.filterTools = function() {
    currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
    renderTools();
};

renderTools();
