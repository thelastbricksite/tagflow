        let currentCategory = 'all';
        let currentSearch = '';

        // Render tools grid
        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            const filtered = tools.filter(tool => {
                const matchesCategory = currentCategory === 'all' || tool.cat === currentCategory;
                const matchesSearch = !currentSearch || 
                    tool.name.toLowerCase().includes(currentSearch) ||
                    tool.desc.toLowerCase().includes(currentSearch) ||
                    tool.cat.toLowerCase().includes(currentSearch);
                return matchesCategory && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="no-results">🔍 No tools found matching your search. Try different keywords!</div>';
                return;
            }

            grid.innerHTML = filtered.map(tool => `
                <a href="tools/${tool.filename}" class="tool-card">
                    <div class="card-header">
                        <span class="tool-number">#${tool.num}</span>
                        <span class="tool-category">${tool.cat}</span>
                    </div>
                    <h3>${tool.name}</h3>
                    <p class="tool-description">${tool.desc}</p>
                    <div class="tool-meta">
                        <span class="tool-tag ${tool.badgeClass}">${tool.badge}</span>
                        <span class="tool-tag">${tool.cat}</span>
                    </div>
                </a>
            `).join('');
        }

        // Filter by category
        window.filterByCategory = function(category, btn) {
            currentCategory = category;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            renderTools();
        };

        // Search tools
        window.filterTools = function() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase().trim();
            renderTools();
        };

        // Initial render
        renderTools();
    </script>
